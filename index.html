  body {

  .button-grid {
    display: grid;

  }

  .portfolio-btn {

    font-size: 16px;

    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    width: 196.83px; /* desktop width */
    height: 140px;   /* desktop height */
    cursor: pointer;
  }

  .portfolio-btn:hover {
    background: #0056b3;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  footer {
    margin-top: 60px;
    color: #888;
    font-size: 14px;
    text-align: center;
  }

  /* Mobile styles */
  @media (max-width: 500px) {
    .button-grid {
      grid-template-columns: repeat(2, 185px); /* mobile fixed width 2 columns */
      gap: 15px;
      width: max-content;
    }

    .portfolio-btn {
      width: 185px;
      height: 110px;
      font-size: 14px;
    }
  }

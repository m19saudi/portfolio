<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    color: #333;
    margin-bottom: 10px;
  }

  p {
    color: #555;
    margin-bottom: 40px;
    text-align: center;
  }

  .button-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 900px;
  }

  .portfolio-btn {
    background: #007bff;
    color: #fff;
    padding: 20px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 16px;
    text-align: center;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    height: 100px;
    cursor: pointer;
  }

  .portfolio-btn:hover {
    background: #0056b3;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  footer {
    margin-top: 60px;
    color: #888;
    font-size: 14px;
    text-align: center;
  }

  @media (max-width: 500px) {
    .portfolio-btn {
      height: 80px;
      font-size: 14px;
      padding: 15px;
    }
  }
</style>
</head>
<body>

<h1>My Portfolio</h1>
<p>Check out some of my projects below</p>

<div class="button-grid">
  <a class="portfolio-btn" href="https://m19saudi.github.io/html-viewer/" target="_blank">HTML-Viewer</a>
  <a class="portfolio-btn" href="https://m19saudi.github.io/qr/" target="_blank">QR Code</a>
  <a class="portfolio-btn" href="https://m19saudi.github.io/clipboard/" target="_blank">Clipboard</a>
  <a class="portfolio-btn" href="https://m19saudi.github.io/pixelfy/" target="_blank">Pixelfy</a>
  <a class="portfolio-btn" href="https://m19saudi.github.io/portfolio/" target="_blank">Portfolio</a>
  <a class="portfolio-btn" href="https://m19saudi.github.io/test/" target="_blank">Test</a>
  <a class="portfolio-btn" href="https://m19saudi.github.io/more/" target="_blank">Project 6</a>
</div>

<footer>
  &copy; 2026 M19Saudi. All rights reserved.
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<link rel="icon" type="image/png" href="data:image/png;base64,...">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007BFF">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="M19 Portfolio">
<link rel="apple-touch-icon" href="icon-512.png">

<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    color: #333;
    margin-bottom: 10px;
  }

  p {
    color: #555;
    margin-bottom: 40px;
    text-align: center;
  }

  .button-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 900px;
  }

  .portfolio-btn {
    background: #007bff;
    color: #fff;
    padding: 20px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 16px;
    text-align: center;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    height: 100px;
    cursor: pointer;
  }

  .portfolio-btn:hover {
    background: #0056b3;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  footer {
    margin-top: 60px;
    color: #888;
    font-size: 14px;
    text-align: center;
  }

  /* MOBILE FIX: Always 2 columns and no overflow */
  @media (max-width: 500px) {
    .button-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 100%;
    }

    .portfolio-btn {
      height: 80px;
      font-size: 14px;
      padding: 15px;
    }
  }
</style>
</head>
<body>

<h1>My Portfolio</h1>
<p>Check out some of my projects below</p>

<!-- PAGE 1 -->
<div id="page1">
  <div class="button-grid">
    <a class="portfolio-btn" href="https://m19saudi.github.io/athkar/" target="_blank">Athkar</a>
    <a class="portfolio-btn" href="https://m19saudi.github.io/html-viewer/" target="_blank">HTML-Viewer</a>
    <a class="portfolio-btn" href="https://m19saudi.github.io/qr/" target="_blank">QR Generator</a>
    <a class="portfolio-btn" href="https://m19saudi.github.io/qr-reader/" target="_blank">QR Scanner</a>
    <a class="portfolio-btn" href="https://lab-tools.tiiny.site/" target="_blank">Lab Tools</a>
    <a class="portfolio-btn" href="https://clipboard-nu-sepia.vercel.app/" target="_blank">Clipboard</a>
    <a class="portfolio-btn" href="https://m19saudi.github.io/pixelfy/" target="_blank">Pixelfy</a>
    <a class="portfolio-btn" href="https://m19saudi.github.io/GarageX/" target="_blank">GarageX</a>
    <a class="portfolio-btn" href="https://ai-lab-dashboard.vercel.app/" target="_blank">AI Lab</a>
    <a class="portfolio-btn" href="https://coda.io/@m-saudi/arranger" target="_blank">Blog</a>
    <a class="portfolio-btn" href="https://github.com/dashboard" target="_blank">Dashboard</a>

    <!-- Next button as a normal portfolio link -->
    <a class="portfolio-btn" href="#page2" onclick="showPage('page2'); return false;">Next →</a>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" style="display:none;">
  <div class="button-grid">
    <a class="portfolio-btn" href="https://m19saudi.github.io/test/" target="_blank">Test1</a>
    <a class="portfolio-btn" href="https://m19saudi.github.io/test/" target="_blank">Test2</a>

    <!-- Prev button as a normal portfolio button -->
    <a class="portfolio-btn" href="#page1" onclick="showPage('page1'); return false;">← Prev</a>
  </div>
</div>

<footer>
  &copy; 2026 M19Saudi. All rights reserved.
</footer>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js')
    .then(() => console.log('Service Worker Registered'));
}

// Optional install prompt button
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  const btn = document.createElement("div");
  btn.innerText = "Install App";
  btn.style.position = "fixed";
  btn.style.bottom = "20px";
  btn.style.right = "20px";
  btn.style.background = "#007BFF";
  btn.style.color = "#fff";
  btn.style.padding = "12px 18px";
  btn.style.borderRadius = "8px";
  btn.style.cursor = "pointer";
  btn.style.boxShadow = "0 5px 15px rgba(0,0,0,0.2)";
  btn.style.zIndex = "9999";
  document.body.appendChild(btn);

  btn.addEventListener("click", () => {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      btn.remove();
    });
  });
});

// PAGE SWITCH FUNCTION
function showPage(id) {
  document.getElementById("page1").style.display = "none";
  document.getElementById("page2").style.display = "none";
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
